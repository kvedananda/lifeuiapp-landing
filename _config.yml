  - title                                 : Customizable Dashboard
    description                           : Charts, forms, and more. Build a dashboard as unique as you are.
    fontawesome_icon_name                 : th-large
    
  - title                                 : Visualize Your Data
    description                           : Gain insight and answer questions about yourself.
    fontawesome_icon_name                 : chart-line

  - title                                 : Enhanced Data Input
    description                           : Form tiles and quick add help to speed up data entry into Apple Health.
    fontawesome_icon_name                 : plus-circle

  - title                                 : Total Privacy
    description                           : No tracking, no data collection, no ads. Your Apple Health data stays on your device.
    fontawesome_icon_name                 : lock

  - title                                 : Create Custom Data Types
    description                           : Create your own data types for health or habits and view them alongside your Apple Health data.
    fontawesome_icon_name                 : pencil-alt

  - title                                 : Free with Paid Features
    description                           : LifeUI is free to use with limited features. No payment, account, or subscription required. For more features, consider upgrading to Pro.
    fontawesome_icon_name                 : star

